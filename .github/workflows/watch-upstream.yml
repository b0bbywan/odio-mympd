name: Watch upstream myMPD

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Only log, do not push tag'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Resolve latest upstream release
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/jcorporation/myMPD/releases/latest --jq .tag_name)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Upstream latest: ${TAG}"

      - name: Check if tag already exists locally
        id: check
        run: |
          git fetch --tags --quiet
          if git rev-parse "refs/tags/${{ steps.upstream.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.upstream.outputs.tag }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New upstream release detected: ${{ steps.upstream.outputs.tag }}"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false' && !inputs.dry_run
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "${{ steps.upstream.outputs.tag }}" \
            -m "Track upstream myMPD ${{ steps.upstream.outputs.tag }}"
          git push origin "${{ steps.upstream.outputs.tag }}"
