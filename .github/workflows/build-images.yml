name: Build builder images

on:
  push:
    branches: [main]
    paths:
      - 'docker/builder.Dockerfile'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
  schedule:
    # Refresh monthly to pick up base image security updates
    - cron: '0 4 1 * *'

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            base: debian:trixie
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            base: vascoguita/raspios:arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - arch: armhf
            base: vascoguita/raspios:armhf
            platform: linux/arm/v7
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        if: matrix.arch == 'armhf'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker
          file: docker/builder.Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
          tags: ghcr.io/${{ github.repository_owner }}/odio-mympd-builder:${{ matrix.arch }}
          push: true
          cache-from: type=gha,scope=builder-${{ matrix.arch }}
          cache-to: type=gha,scope=builder-${{ matrix.arch }},mode=max
